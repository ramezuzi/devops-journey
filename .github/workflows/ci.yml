name: CI Pipeline

on:
  push:
    branches: [ main ]
    pull_request:
      branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest


steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: check bash scripts exist
    run: ls -la scripts/

  - name: Run health monitor (dry run)
    run: |
      chmod +x scripts/health-monitor.sh
      bash -n scripts/health-monitor.sh
      echo "Syntax OK"

  - name: Print success
    run: echo "All checks passed!"
